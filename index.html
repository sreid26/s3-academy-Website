<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S3 Academy | Elite Academic & Athletic Leadership</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: '#0B1D3A', // Precision matched to Panther Logo
            gold: '#C89B3C', // Precision matched to Panther Logo
            offWhite: '#F5F7FA',
            slate: {
              DEFAULT: '#6B7280',
              50: '#F9FAFB',
              100: '#F3F4F6',
              200: '#E5E7EB',
            }
          },
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
            header: ['Bebas Neue', 'sans-serif'],
          },
          spacing: {
            'section': 'clamp(4.5rem, 8vw, 6rem)',
            'gutter': 'clamp(1.5rem, 4vw, 2rem)',
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --navy: #0B1D3A;
      --gold: #C89B3C;
    }

    body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      line-height: 1.75;
      color: var(--navy);
    }

    h1, h2, h3 {
      letter-spacing: -0.01em;
      line-height: 1.1;
    }

    .container-tight {
      max-width: 1140px;
      margin-left: auto;
      margin-right: auto;
      padding-left: 1.5rem;
      padding-right: 1.5rem;
    }

    .btn-premium {
      background: var(--gold);
      color: var(--navy);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.875rem 1.75rem;
      border-radius: 9999px;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      font-size: 0.75rem;
      border: 2px solid transparent;
      box-shadow: 0 10px 20px -10px rgba(200, 155, 60, 0.5);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      white-space: nowrap;
    }

    .btn-premium:hover {
      background: #b38a35;
      transform: translateY(-2px);
      box-shadow: 0 15px 30px -10px rgba(200, 155, 60, 0.7);
      color: #fff;
    }

    .logo-glow:hover {
      filter: drop-shadow(0 0 15px rgba(200, 155, 60, 0.4));
    }

    @keyframes panther-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }

    .animate-panther {
      animation: panther-pulse 4s ease-in-out infinite;
    }
    
    .hero-zoom {
      animation: zoom-fade 20s ease-in-out infinite alternate;
    }
    
    @keyframes zoom-fade {
      from { transform: scale(1); }
      to { transform: scale(1.1); }
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "@iconify/react": "https://esm.sh/@iconify/react@4.1.1",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-white">
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
